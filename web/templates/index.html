<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kvartis — предсказание цены</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f9f9f9; }
        h1 { color: #333; }
        label { display: inline-block; width: 180px; margin: 10px 0 5px; font-weight: bold; }
        input { padding: 8px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px 30px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 30px; padding: 20px; background: #d4edda; border: 2px solid #28a745; border-radius: 8px; font-size: 24px; font-weight: bold; color: #155724; }
    </style>
</head>
<body>
    <h1>🏠 Kvartis — предсказание цены квартиры</h1>
    
    <form method="post">
        <label>Город:</label>
        <input type="text" name="city" value="{{ inputs.get('city', 'Novosibirsk') }}" required><br>
        
        <label>Комнаты:</label>
        <input type="number" name="rooms" value="{{ inputs.get('rooms', 4) }}" required><br>
        
        <label>Площадь (м²):</label>
        <input type="number" step="0.01" name="m2" value="{{ inputs.get('m2', 139) }}" required><br>
        
        <label>Ремонт (not_needs / needs и т.д.):</label>
        <input type="text" name="repair" value="{{ inputs.get('repair', 'not_needs') }}" required><br>
        
        <label>Этаж:</label>
        <input type="number" name="floor" value="{{ inputs.get('floor', 1) }}" required><br>
        
        <label>Всего этажей:</label>
        <input type="number" name="all_floor" value="{{ inputs.get('all_floor', 3) }}" required><br>
        
        <button type="submit">🔮 Предсказать цену</button>
    </form>

    {% if result %}
    <div class="result">
        {{ result }}
    </div>
    {% endif %}

    <p style="margin-top:40px; color:#666; font-size:14px;">
        Файл <code>wdata.csv</code> автоматически перезаписывается при каждом запросе.<br>
        Модель и скейлер загружаются один раз при старте сервера.
    </p>
</body>
</html>
